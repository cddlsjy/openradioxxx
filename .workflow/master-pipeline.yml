version: '1.0'
name: master-pipeline
displayName: 主分支流水线
triggers:
  push:
    branches:
      include:
        - main
        - master
stages:
  - name: build
    displayName: 构建 APK
    steps:
      - step: build@gradle
        name: build_gradle
        displayName: Gradle 构建
        jdkVersion: '17'               # 指定 JDK 17 满足插件要求
        gradleVersion: '8.13'          # 可选，保持与之前一致
        commands:
          - chmod +x gradlew
          - ./gradlew assembleDebug
      - step: publish@build_artifacts
        name: publish_apk
        displayName: 上传 APK
        paths:
          - app/build/outputs/apk/debug/*.apk