version: '1.0'
name: master-pipeline
displayName: 主分支流水线
triggers:
  push:
    branches:
      include:
        - main
        - master
stages:
  - name: build
    displayName: 构建 APK
    steps:
      - step: build@custom
        name: custom_build
        displayName: 自定义构建
        image: openjdk:17-jdk
        commands:
          - chmod +x gradlew
          - ./gradlew assembleDebug
      - step: publish@build_artifacts
        name: publish_apk
        displayName: 上传 APK
        paths:
          - app/build/outputs/apk/debug/*.apk