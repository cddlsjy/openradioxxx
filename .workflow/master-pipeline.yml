version: '1.0'
name: master-pipeline
displayName: 主分支流水线
trigger:
  push:
    branches:
      include:
        - main
        - master
stages:
  - name: build
    displayName: 构建 APK
    steps:
      - step: build@gradle
        name: build_gradle
        displayName: Gradle 构建
        gradleVersion: 7.6
        commands:
          - chmod +x gradlew
          - ./gradlew assembleDebug
      - step: publish@build_artifacts
        name: publish_apk
        displayName: 上传 APK
        paths:
          - app/build/outputs/apk/debug/*.apk